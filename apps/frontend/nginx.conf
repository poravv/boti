gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

server {
    listen 80;

    # Defer upstream DNS resolution to request time so nginx starts even if
    # the backend container is not yet running (avoids "host not found" crash).
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend http://backend:3001;

    # Vite emits content-hashed filenames under /assets/ — safe to cache forever.
    location /assets/ {
        root /usr/share/nginx/html;
        expires max;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
        # index.html must never be cached so users always get the latest shell.
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /api/ {
        # Use $request_uri so the full path is forwarded correctly.
        # proxy_pass with a variable + explicit path drops everything after
        # the location match — $request_uri avoids that.
        proxy_pass $backend$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /ws {
        proxy_pass $backend$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
