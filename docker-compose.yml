
services:
  postgres:
    image: postgres:15-alpine
    container_name: boti-postgres
    environment:
      POSTGRES_USER: boti_user
      POSTGRES_PASSWORD: boti_password
      POSTGRES_DB: boti_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - boti-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: boti-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - boti-network
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: boti-backend
    depends_on:
      - postgres
      - redis
    env_file: .env
    ports:
      - "3001:3001"
    volumes:
      - .baileys-auth:/app/apps/backend/.baileys-auth
    networks:
      - boti-network
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:3001}
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
    container_name: boti-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - boti-network
    restart: unless-stopped

networks:
  boti-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
