apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-nginx-config
  namespace: boti
data:
  # In K8s the Ingress handles /api/* and /ws routing to the backend.
  # The frontend only serves the React SPA static files.
  default.conf: |
    server {
        listen 80;
        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
            try_files $uri $uri/ /index.html;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: boti-frontend
  namespace: boti
  labels:
    app: boti-frontend
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: boti-frontend
  template:
    metadata:
      labels:
        app: boti-frontend
    spec:
      containers:
      - name: boti-frontend
        image: ghcr.io/elporavv/boti-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            memory: "32Mi"
            cpu: "20m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 15
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
      imagePullSecrets:
      - name: ghcr-secret
      volumes:
      - name: nginx-config
        configMap:
          name: frontend-nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: boti-frontend-service
  namespace: boti
  labels:
    app: boti-frontend
spec:
  type: ClusterIP
  selector:
    app: boti-frontend
  ports:
  - port: 80
    targetPort: 80
    name: http
